<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <title>First Runner</title>
    <!-- Open Graph Data -->
    <meta property="og:title" content="First Runner - Conquiste a Cidade">
    <meta property="og:description" content="O primeiro Cyberpunk Fitness App impulsionado por I.A.">
    <meta property="og:image" content="https://www.firstrunner.com.br/assets/fundodosite-og.jpg">
    <meta property="og:url" content="https://www.firstrunner.com.br/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="translations.js"></script>
    <script src="language-manager.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #050505;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('assets/isometric_dark_city.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1959330144663699');
      fbq('track', 'PageView');
    </script>
</head>

<body class="relative w-full text-white font-sans overflow-x-hidden selection:bg-orange-500/30 antialiased">

    <!-- CAMADA 1: FUNDO ESTÁTICO -->
    <div class="bg-layer"></div>
    <div class="overlay"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        <!-- NAVEGAÇÃO SUPERIOR (Larga como no React) -->
        <nav class="fixed top-4 left-4 right-4 lg:left-8 lg:right-8 backdrop-blur-xl bg-[#080b12]/90 border border-white/5 rounded-[20px] px-8 py-5 flex items-center justify-between z-50 shadow-2xl pointer-events-auto">
            <!-- Logótipo -->
            <a href="index.html" class="flex items-center gap-4 cursor-pointer hover:opacity-80 transition-opacity">
                <!-- Ícone F -->
                <svg class="w-9 h-9 drop-shadow-[0_0_12px_rgba(255,255,255,0.3)]" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 6H34V14H16V20H28V27H16V36H6V6Z" fill="white"/>
                </svg>
                <!-- Texto Logo -->
                <div class="flex flex-col leading-[0.9] font-black tracking-widest text-white text-xl uppercase" translate="no">
                    <span>FIRST</span>
                    <span>RUNNER</span>
                </div>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center gap-10">
                <a href="index.html" class="text-[12px] font-black tracking-[0.15em] transition-all uppercase cursor-pointer text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.8)]" data-i18n="nav_home">INÍCIO</a>
                <a href="como-funciona.html" class="text-[12px] font-black tracking-[0.15em] transition-all uppercase cursor-pointer text-white/50 hover:text-white" data-i18n="nav_how_it_works">COMO FUNCIONA</a>
                <a href="#" class="text-[12px] font-black tracking-[0.15em] transition-all uppercase cursor-pointer text-white/50 hover:text-white">HERO</a>
                <a href="whitepaper.html" class="text-[12px] font-black tracking-[0.15em] transition-all uppercase cursor-pointer text-white/50 hover:text-white">WHITEPAPER</a>
                <a href="early-access.html" class="text-[12px] font-black tracking-[0.15em] transition-all uppercase cursor-pointer text-orange-500 hover:text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]" data-i18n="nav_early_access">EARLY ACCESS</a>
            </div>

            <!-- Language Switcher & Mobile Menu -->
            <div class="flex items-center gap-4 pointer-events-auto">
                <button onclick="LanguageManager.toggleLanguage()" class="flex items-center gap-2 text-sm font-bold text-white/70 hover:text-white transition-colors">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span id="current-lang-display">PT</span>
                </button>
                <button class="lg:hidden text-white p-2">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </nav>

        <!-- CONTEÚDO PRINCIPAL (Flutuando sobre o Fundo) -->
        <main class="flex-grow flex flex-col items-center justify-center text-center px-4 w-full pt-32 pb-20 pointer-events-none">
            
            <h1 class="text-5xl md:text-[80px] lg:text-[130px] font-black italic tracking-tighter text-white drop-shadow-2xl leading-none">
                <span translate="no">FIRST RUNNER</span>
            </h1>
            <p class="mt-6 text-xs md:text-xl font-medium tracking-[0.15em] text-white/90 uppercase drop-shadow-md" data-i18n="hero_subtitle">
                Conquiste a sua cidade, Seja O PRIMEIRO CORREDOR
            </p>
            <a href="early-access.html" class="pointer-events-auto mt-10 px-10 py-4 rounded-full border-2 border-orange-500 bg-[#050505]/60 backdrop-blur-md text-white text-sm font-bold tracking-widest hover:bg-orange-500 hover:text-black transition-all shadow-[0_0_20px_rgba(249,115,22,0.3)] hover:shadow-[0_0_40px_rgba(249,115,22,0.6)]" data-i18n="hero_cta">
                JUNTAR À CORRIDA
            </a>

            <!-- Badges Inferiores -->
            <div class="w-full max-w-5xl mx-auto px-4 mt-20 pointer-events-auto">
                <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                    <!-- Google Cloud Badge -->
                    <div class="flex items-center justify-between w-full md:w-auto px-8 py-5 bg-black/50 backdrop-blur-xl border border-white/5 rounded-2xl md:rounded-full shadow-2xl hover:bg-black/60 transition-colors cursor-default">
                        <div class="flex flex-col text-left mr-10">
                            <span class="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600 uppercase">Gemini Live <span class="text-white">Agent Challenge</span></span>
                            <span class="text-[10px] font-bold tracking-widest text-white/50 uppercase mt-1">Submit by March 16, 2026</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[8px] font-black tracking-[0.2em] text-white/40 uppercase mb-1">Powered by</span>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold tracking-wider text-white">Google Cloud</span>
                                <!-- Sparkle icon simplificado -->
                                <svg class="w-6 h-6 text-orange-400" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="relative z-10 w-full border-t border-white/5 bg-[#080b12]/90 backdrop-blur-xl py-8 pointer-events-auto">
            <div class="max-w-[1400px] mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-3 opacity-50 hover:opacity-100 transition-opacity cursor-pointer">
                    <svg viewBox="0 0 100 100" class="w-6 h-6 shrink-0">
                        <path d="M 0 0 H 100 L 80 20 H 20 V 40 H 80 L 60 60 H 20 V 80 L 0 100 Z" fill="white" />
                    </svg>
                    <span class="text-sm font-black tracking-widest text-white uppercase" translate="no">First Runner</span>
                </div>
                
                <div class="flex items-center gap-6 text-[10px] font-bold tracking-[0.2em] text-white/40">
                    <a href="#" class="hover:text-white transition-colors">TERMS</a>
                    <a href="#" class="hover:text-white transition-colors">PRIVACY</a>
                    <a href="#" class="hover:text-white transition-colors">X (TWITTER)</a>
                    <a href="#" class="hover:text-white transition-colors">DISCORD</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
