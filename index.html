    <!-- Three.js AAA Procedural City Engine -->
    <script>
    (function() {
        const canvas = document.getElementById('city-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x020204);

        const scene = new THREE.Scene();
        // Fog urbano espesso (efeito de metrópole infinita)
        scene.fog = new THREE.FogExp2(0x020204, 0.012);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 400);
        camera.position.set(0, 20, 70);
        camera.lookAt(0, 0, 0);

        // ---- POST PROCESSING (BLOOM) ----
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.6, 0.2);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ---- MOUSE TRACKING ----
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        const neonColors = [
            new THREE.Color(0x00e5ff), // Cyan
            new THREE.Color(0xd500f9), // Purple
            new THREE.Color(0xff6d00), // Orange
            new THREE.Color(0x00e676), // Green
            new THREE.Color(0xff1744), // Red
            new THREE.Color(0x2979ff), // Blue
        ];

        // ==========================================
        // TEXTURAS PROCEDURAIS (JANELAS REALISTAS)
        // ==========================================
        function createCityTexture() {
            const ctxCanvas = document.createElement('canvas');
            ctxCanvas.width = 512;
            ctxCanvas.height = 1024;
            const ctx = ctxCanvas.getContext('2d');

            // Fundo da fachada (Vidro escuro)
            ctx.fillStyle = '#06060a';
            ctx.fillRect(0, 0, 512, 1024);

            const rows = 40;
            const cols = 20;
            const windowW = 512 / cols;
            const windowH = 1024 / rows;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const margin = 2;
                    // Probabilidade da janela estar acesa (estilo prédio de escritório ŕ noite)
                    if (Math.random() > 0.8) {
                        // Cor da luz (Luz quente amarelada ou monitor ciano)
                        const isWarm = Math.random() > 0.4;
                        ctx.fillStyle = isWarm ? '#ffea99' : '#baddff';
                        ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                        ctx.fillRect(c * windowW + margin, r * windowH + margin, windowW - margin * 2, windowH - margin * 2);
                    }
                }
            }
            ctx.globalAlpha = 1.0;
            const texture = new THREE.CanvasTexture(ctxCanvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 4); // Repete a textura pelos prédios altos
            
            // Filtros para evitar embaçamento nas janelas
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        const cityMap = createCityTexture();
        const cityEmissiveMap = createCityTexture(); 

        const buildingMat = new THREE.MeshStandardMaterial({
            color: 0x11111a, // Base metálica escura
            roughness: 0.2,  // Reflexivo
            metalness: 0.8,  // Muito metálico
            map: cityMap,
            emissive: 0xffffff,
            emissiveMap: cityEmissiveMap,
            emissiveIntensity: 0.7 // Faz as janelas brilharem pro Bloom
        });

        // ==========================================
        // GERADOR DE CIDADE MASSIVA (InstancedMesh)
        // ==========================================
        const gridRadius = 24; // 48x48 quarteirőes = mais de 2000 prédios
        const blockSize = 3.5;
        const streetWidth = 1.5;
        const cellSize = blockSize + streetWidth;
        const buildingCount = (gridRadius * 2 + 1) * (gridRadius * 2 + 1);

        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        buildingGeo.translate(0, 0.5, 0); // Pivô na base para escalar

        const cityInstancedMesh = new THREE.InstancedMesh(buildingGeo, buildingMat, buildingCount);
        scene.add(cityInstancedMesh);

        const dummy = new THREE.Object3D();
        let instanceIdx = 0;

        for (let x = -gridRadius; x <= gridRadius; x++) {
            for (let z = -gridRadius; z <= gridRadius; z++) {
                const dist = Math.sqrt(x*x + z*z);
                
                // Distribuiçăo de altura de metrópole (centro denso e alto)
                const baseHeight = Math.max(2, 20 - dist * 0.6);
                let height = baseHeight + Math.random() * 10;
                
                // Super Arranha-céus
                if (Math.random() > 0.96 && dist < 15) {
                    height += 25 + Math.random() * 15;
                }
                
                // Praças
                if (Math.random() > 0.92) {
                    height = 0.5;
                }

                const scaleX = blockSize * (0.7 + Math.random() * 0.4);
                const scaleZ = blockSize * (0.7 + Math.random() * 0.4);

                dummy.position.set(x * cellSize, 0, z * cellSize);
                dummy.scale.set(scaleX, height, scaleZ);
                dummy.updateMatrix();

                cityInstancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
                instanceIdx++;
            }
        }
        cityInstancedMesh.instanceMatrix.needsUpdate = true;

        // ==========================================
        // RUAS NEON E ASFALTO
        // ==========================================
        const streetGroup = new THREE.Group();
        scene.add(streetGroup);

        for (let z = -gridRadius; z <= gridRadius; z++) {
            if (Math.abs(z) > 12 && Math.random() > 0.4) continue;
            const color = neonColors[Math.abs(z) % neonColors.length].clone();
            color.multiplyScalar(2.0); 
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 });
            const geo = new THREE.PlaneGeometry((gridRadius * 2 + 1) * cellSize, streetWidth * 0.7);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(0, 0.05, z * cellSize + blockSize / 2 + streetWidth / 2);
            streetGroup.add(mesh);
        }

        for (let x = -gridRadius; x <= gridRadius; x++) {
            if (Math.abs(x) > 12 && Math.random() > 0.4) continue;
            const color = neonColors[Math.abs(x + 3) % neonColors.length].clone();
            color.multiplyScalar(2.0);
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 });
            const geo = new THREE.PlaneGeometry(streetWidth * 0.7, (gridRadius * 2 + 1) * cellSize);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x * cellSize + blockSize / 2 + streetWidth / 2, 0.05, 0);
            streetGroup.add(mesh);
        }

        // Asfalto reflexivo (Chăo)
        const groundGeo = new THREE.PlaneGeometry((gridRadius * 2 + 2) * cellSize, (gridRadius * 2 + 2) * cellSize);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x010101, 
            roughness: 0.05, // Muito polido (Asfalto molhado refletindo a cidade)
            metalness: 0.5
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // ==========================================
        // TRÁFEGO / CORREDORES (Trails Animados)
        // ==========================================
        const trails = [];
        const trailCount = 120; 

        for (let i = 0; i < trailCount; i++) {
            const isHorizontal = Math.random() > 0.5;
            const streetIdx = Math.floor(Math.random() * (gridRadius * 2 + 1)) - gridRadius;
            const baseColor = neonColors[Math.floor(Math.random() * neonColors.length)].clone();
            const coreColor = baseColor.clone().lerp(new THREE.Color(0xffffff), 0.8).multiplyScalar(4.0);

            const trailGeo = new THREE.SphereGeometry(0.25, 8, 8);
            const trailMat = new THREE.MeshBasicMaterial({ color: coreColor });
            const trailMesh = new THREE.Mesh(trailGeo, trailMat);

            const light = new THREE.PointLight(baseColor, 4, 25); 

            const speed = 0.05 + Math.random() * 0.1;
            const direction = Math.random() > 0.5 ? 1 : -1;
            const extent = gridRadius * cellSize;

            let pos = -extent * direction + Math.random() * extent * 2;
            
            if (isHorizontal) {
                trailMesh.position.set(pos, 0.5, streetIdx * cellSize + blockSize / 2 + streetWidth / 2);
                trailMesh.scale.set(4, 1, 1);
            } else {
                trailMesh.position.set(streetIdx * cellSize + blockSize / 2 + streetWidth / 2, 0.5, pos);
                trailMesh.scale.set(1, 1, 4);
            }

            light.position.copy(trailMesh.position);
            scene.add(trailMesh);
            scene.add(light);
            trails.push({ mesh: trailMesh, light, isHorizontal, speed, direction, extent, pos });
        }

        // ==========================================
        // ILUMINAÇĂO GLOBAL
        // ==========================================
        scene.add(new THREE.AmbientLight(0x1a1a2e, 1.2)); 
        const dirLight = new THREE.DirectionalLight(0x223355, 1.5);
        dirLight.position.set(30, 60, -30);
        scene.add(dirLight);

        // Hemisphere light para o céu noturno
        const hemiLight = new THREE.HemisphereLight(0x0f172a, 0x000000, 1.5);
        scene.add(hemiLight);

        // ==========================================
        // ANIMAÇĂO E RENDER
        // ==========================================
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;

            // Parallax cinemático da câmera
            const targetCamX = mouseX * 25;
            const targetCamY = 18 - mouseY * 12;
            camera.position.x += (targetCamX - camera.position.x) * 0.015;
            camera.position.y += (targetCamY - camera.position.y) * 0.015;
            
            // Foco da câmera (olhando levemente para baixo na cidade)
            camera.lookAt(mouseX * 10, 5, -20 + mouseY * 10);

            // Anima os corredores (Trails)
            for (const trail of trails) {
                trail.pos += trail.speed * trail.direction;
                if (Math.abs(trail.pos) > trail.extent) trail.pos = -trail.extent * trail.direction;
                if (trail.isHorizontal) trail.mesh.position.x = trail.pos;
                else trail.mesh.position.z = trail.pos;
                trail.light.position.copy(trail.mesh.position);
            }

            // Pulso das ruas neon
            streetGroup.children.forEach((street, i) => {
                street.material.opacity = 0.6 + Math.sin(time * 4 + i * 0.2) * 0.3;
            });

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
