<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <title>First Runner</title>
    <!-- Open Graph Data -->
    <meta property="og:title" content="First Runner - Conquiste a Cidade">
    <meta property="og:description" content="O primeiro Cyberpunk Fitness App impulsionado por I.A.">
    <meta property="og:image" content="https://www.firstrunner.com.br/assets/fundodosite-og.jpg">
    <meta property="og:url" content="https://www.firstrunner.com.br/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #050505;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('assets/isometric_dark_city.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .btn-neon {
            background: rgba(0,0,0,0.6);
            border: 2px solid #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4), inset 0 0 10px rgba(249, 115, 22, 0.15);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        
        .btn-neon:hover {
            background: #f97316;
            color: #000;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.8), inset 0 0 15px rgba(249, 115, 22, 0.4);
            transform: scale(1.03);
        }

        .glass-nav {
            background: rgba(8, 11, 18, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>

<body class="relative w-full text-white font-sans overflow-x-hidden selection:bg-orange-500/30 antialiased h-screen">

    <!-- FUNDO: IMAGEM GERADA -->
    <div class="bg-layer"></div>

    <!-- INTERFACE -->
    <div class="relative z-10 flex flex-col h-screen w-full">
        
        <!-- NAVBAR MINIMALISTA -->
        <nav class="fixed top-4 left-4 right-4 lg:left-8 lg:right-8 glass-nav rounded-[20px] px-8 py-5 flex items-center justify-between z-50">
            <a href="index.html" class="flex items-center gap-4 cursor-pointer hover:opacity-80 transition-opacity">
                <svg class="w-8 h-8 drop-shadow-[0_0_12px_rgba(255,255,255,0.3)]" viewBox="0 0 40 40" fill="none">
                    <path d="M6 6H34V14H16V20H28V27H16V36H6V6Z" fill="white"/>
                </svg>
                <div class="flex flex-col leading-[0.9] font-black tracking-widest text-white text-lg uppercase" translate="no">
                    <span>FIRST</span>
                    <span>RUNNER</span>
                </div>
            </a>

            <div class="hidden lg:flex items-center gap-10">
                <a href="index.html" class="text-[11px] font-black tracking-[0.15em] uppercase text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.8)]">HOME</a>
                <a href="como-funciona.html" class="text-[11px] font-black tracking-[0.15em] uppercase text-white/50 hover:text-white transition-colors">COMO FUNCIONA</a>
                <a href="whitepaper.html" class="text-[11px] font-black tracking-[0.15em] uppercase text-white/50 hover:text-white transition-colors">WHITEPAPER</a>
                <a href="early-access.html" class="text-[11px] font-black tracking-[0.15em] uppercase text-orange-500 hover:text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]">EARLY ACCESS</a>
            </div>

            <div class="flex items-center gap-4">
                <button class="lg:hidden text-white p-2">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </nav>

        <!-- CTA FLUTUANTE NA BASE -->
        <div class="fixed bottom-12 left-0 right-0 flex justify-center z-20">
            <a href="early-access.html" class="btn-neon px-12 py-4 rounded-full text-sm font-bold tracking-[0.2em] uppercase text-white">
                JOIN THE RACE
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
