<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <title>First Runner - Entrada Segura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="translations.js"></script>
    <script src="language-manager.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #010206;

        }

        .lang-option {
            cursor: pointer;
        }

        .tracking-tightest {
            letter-spacing: -0.06em;
        }

        @keyframes kenburns {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(-1%, -0.5%); }
            100% { transform: scale(1) translate(0, 0); }
        }

        .animate-kenburns {
            animation: kenburns 45s ease-in-out infinite;
        }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#010206">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QLJLQNG0F4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QLJLQNG0F4');

    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1959330144663699');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1959330144663699&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <!-- GoAdopt LGPD -->
    <meta name="adopt-website-id" content="12fd20e9-679b-4c36-8959-c700a9647edf" />
    <script src="//tag.goadopt.io/injector.js?website_code=12fd20e9-679b-4c36-8959-c700a9647edf" class="adopt-injector"></script>
</head>

<body
    class="relative min-h-screen w-full bg-[#010206] text-white font-sans overflow-x-hidden selection:bg-cyan-500/30 antialiased flex flex-col">

    <!-- CAMADA 1: FUNDO PROCEDURAL 4K (VERSÃO CRISTALINA) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute inset-[-5%] w-[110%] h-[110%] bg-cover bg-center animate-kenburns opacity-60"
            style="background-image: url('https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&q=95&w=2560')">
        </div>

        <div class="absolute inset-0 opacity-[0.05] bg-[url('https://grainy-gradients.vercel.app/noise.svg')] z-10">
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/95 z-20"></div>

        <svg class="absolute inset-0 w-full h-full z-20 opacity-70">
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="15" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <line x1="0" y1="65%" x2="100%" y2="65%" stroke="#22d3ee" stroke-width="3" filter="url(#neon-glow)"
                opacity="0.6" />
            <path d="M 1200 1000 L 700 650" stroke="#fb923c" stroke-width="4" filter="url(#neon-glow)" opacity="0.4" />
            <path d="M -200 1000 L 300 650" stroke="#22d3ee" stroke-width="3" filter="url(#neon-glow)" opacity="0.3" />
        </svg>

        <div class="absolute left-0 bottom-0 w-1/3 h-1/2 bg-cyan-900/10 blur-[150px] z-10"></div>
        <div class="absolute right-0 bottom-0 w-1/3 h-1/2 bg-orange-900/10 blur-[150px] z-10"></div>
    </div>

    <!-- CAMADA 2: INTERFACE DE UTILIZADOR -->
    <div class="relative z-40 max-w-7xl mx-auto px-6 py-6 flex flex-col min-h-screen w-full">

        <!-- NAVEGAÇÃO SUPERIOR -->
        <nav class="flex items-center justify-between mb-8 py-4 px-8 bg-[#010206]/60 backdrop-blur-md border border-white/10 rounded-2xl">
            <a href="index.html" class="flex items-center gap-4 group cursor-pointer hover:opacity-80 transition-all">
                <div
                    class="w-11 h-11 bg-white flex items-center justify-center rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.3)] group-hover:scale-110 transition-all duration-500">
                    <span class="text-black font-black text-2xl italic" translate="no">F</span>
                </div>
                <span class="text-2xl font-black tracking-tighter uppercase tracking-widest hidden sm:block" translate="no">First
                    Runner</span>
            </a>

            <div
                class="hidden lg:flex items-center gap-12 text-[14px] font-black tracking-[0.2em] uppercase text-white/70">
                <a href="index.html" class="hover:text-white transition-all" data-i18n="nav_home">Início</a>
                <a href="como-funciona.html" class="hover:text-white transition-all" data-i18n="nav_how_it_works">Como Funciona</a>
                <a href="coach-ia.html" class="hover:text-white transition-all" data-i18n="nav_hero_fitness">Pacer IA</a>
                <a href="roadmap.html" class="hover:text-white transition-all" data-i18n="nav_roadmap">Roadmap</a>
                <a href="early-access.html"
                    class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 drop-shadow-[0_0_15px_rgba(249,115,22,0.6)] animate-pulse transition-all" data-i18n="nav_early_access">Early
                    Access</a>
            </div>

            <div class="flex items-center gap-8">
                <!-- Seletor de Idiomas -->
                <div class="relative group mt-1">
                    <button class="flex items-center gap-2 text-white/70 hover:text-white transition-colors uppercase font-black text-xs tracking-widest cursor-pointer py-2">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                        <span class="hidden sm:inline" id="lang-switcher-label">PT</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i>
                    </button>
                    <!-- Dropdown de Idiomas -->
                    <div class="absolute right-0 top-full mt-2 w-48 bg-[#010206]/95 backdrop-blur-xl border border-cyan-500/20 rounded-lg shadow-[0_0_20px_rgba(0,243,255,0.15)] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 flex flex-col overflow-hidden py-2 z-50">
                        <button onclick="switchLanguage('pt')" class="lang-option px-5 py-3 text-xs font-bold text-left transition-colors uppercase tracking-wider flex items-center justify-between hover:bg-white/5">PT <span class="lang-sublabel text-[10px] opacity-100">Português</span></button>
                        <button onclick="switchLanguage('en')" class="lang-option px-5 py-3 text-xs font-bold text-left transition-colors uppercase tracking-wider flex items-center justify-between hover:bg-white/5">EN <span class="lang-sublabel text-[10px] opacity-50">English</span></button>
                    </div>
                </div>
                <a href="cadastro.html"
                    class="bg-white text-black px-8 py-3.5 rounded-xl text-xs font-black tracking-widest uppercase hover:shadow-[0_0_40px_rgba(255,255,255,0.6)] transition-all active:scale-95 flex items-center justify-center text-center no-underline" data-i18n="nav_get_started">
                    Começar
                </a>
            </div>
        </nav>

        <!-- SECÇÃO LOGIN -->
        <main class="flex-1 flex items-center justify-center w-full">
            <div
                class="w-full max-w-md backdrop-blur-[60px] bg-white/[0.02] border border-white/10 rounded-[48px] p-10 md:p-14 shadow-2xl relative overflow-hidden group">

                <!-- Ícone Desbloqueio Neural -->
                <div
                    class="w-16 h-16 bg-gradient-to-br from-cyan-500/20 to-blue-600/20 rounded-2xl flex items-center justify-center border border-cyan-500/30 mb-8 mx-auto shadow-[0_0_30px_rgba(34,211,238,0.2)]">
                    <i data-lucide="scan-face" class="w-8 h-8 text-cyan-400"></i>
                </div>

                <div class="text-center mb-10">
                    <h2 data-i18n="login_form_title"
                        class="text-3xl font-black tracking-tighter mb-2 uppercase drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)]">
                        Sync Hub</h2>
                    <p data-i18n="login_form_subtitle" class="text-[10px] font-black tracking-[0.4em] text-white/80 uppercase">Acesse sua grade
                        biométrica</p>
                </div>

                <form class="space-y-6">
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </div>
                        <input type="email" data-i18n="login_placeholder_email" placeholder="CÓDIGO DE ACESSO OU EMAIL"
                            class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-xs font-bold uppercase tracking-widest text-white placeholder-white/20 focus:outline-none focus:border-cyan-400/50 focus:bg-white/5 transition-all outline-none"
                            required />
                    </div>

                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" data-i18n="login_placeholder_pass" placeholder="SENHA DA REDE NEURAL"
                            class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-xs font-bold uppercase tracking-widest text-white placeholder-white/20 focus:outline-none focus:border-cyan-400/50 focus:bg-white/5 transition-all outline-none"
                            required />
                    </div>

                    <div
                        class="flex items-center justify-between text-[10px] font-bold tracking-widest uppercase mt-4 mb-8">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <div
                                class="w-4 h-4 rounded border border-white/20 flex items-center justify-center group-hover:border-cyan-400 transition-colors">
                            </div>
                            <span data-i18n="login_keep_connected" class="opacity-60 group-hover:opacity-100 transition-opacity">Manter Conexão</span>
                        </label>
                        <a href="#" data-i18n="login_forgot_pass" class="text-cyan-400 hover:text-cyan-300 transition-colors">Esqueceu a senha?</a>
                    </div>

                    <button type="button"
                        class="w-full bg-white text-black py-4 rounded-xl text-xs font-black tracking-[0.3em] uppercase hover:shadow-[0_0_40px_rgba(255,255,255,0.6)] transition-all active:scale-95 flex items-center justify-center gap-3 group">
                        <span data-i18n="login_btn_submit">Estabelecer Uplink</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </button>

                    <!-- OR Divider -->
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-white/10"></div>
                        <span data-i18n="login_or"
                            class="flex-shrink-0 mx-4 text-white/30 text-[9px] uppercase font-black tracking-[0.3em]">Ou
                            Sincronize Via</span>
                        <div class="flex-grow border-t border-white/10"></div>
                    </div>

                    <!-- Botões Sociais -->
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button"
                            class="flex items-center justify-center gap-3 py-3.5 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-colors group">
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition-opacity"
                                viewBox="0 0 24 24">
                                <path fill="currentColor"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="currentColor"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="currentColor"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="currentColor"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            <span data-i18n="login_sync_google"
                                class="text-[10px] font-bold tracking-widest uppercase opacity-70 group-hover:opacity-100 transition-opacity">Google</span>
                        </button>
                        <button type="button"
                            class="flex items-center justify-center gap-3 py-3.5 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-colors group">
                            <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition-opacity"
                                fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.26-.78 3.59-.8 1.55.05 2.86.72 3.63 1.84-3.29 1.94-2.81 6.34.46 7.63-.78 1.34-1.68 2.58-2.76 3.5zm-3.87-14.8c.2-1.63-1.06-3.2-2.8-3.48-.42 2 1.25 3.45 2.8 3.48z" />
                            </svg>
                            <span data-i18n="login_sync_apple"
                                class="text-[10px] font-bold tracking-widest uppercase opacity-70 group-hover:opacity-100 transition-opacity">Apple</span>
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-8 border-t border-white/5 text-center">
                    <p class="text-[10px] font-bold tracking-widest uppercase opacity-40">
                        <span data-i18n="login_not_member">Ainda não é um First Runner?</span> <a href="cadastro.html"
                            class="text-cyan-400 hover:text-cyan-300 ml-1 transition-colors relative z-10" data-i18n="login_signup_link">Recrute-se
                            agora</a>
                    </p>
                </div>
            </div>
        </main>

        <!-- RODAPÉ ESTATÍSTICO E LEGAL -->
        <footer class="mt-auto py-8 text-center text-[10px] font-black tracking-[0.6em] opacity-20 uppercase">
            <p data-i18n="footer_secure_uplink">© 2026 FIRST RUNNER // SECURE UPLINK</p>
        </footer>

    </div>

    <!-- Inicializar Ícones Lucide -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
